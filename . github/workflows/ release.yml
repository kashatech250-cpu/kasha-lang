name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: kashalang-linux
          - os: windows-latest
            asset_name: kashalang-windows
          - os: macos-latest
            asset_name: kashalang-macos

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --onefile --name kasha kasha
        chmod +x dist/kasha
    
    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --name kasha.exe kasha
    
    - name: Create archive
      run: |
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          7z a ../${{ matrix.asset_name }}.zip kasha.exe
        else
          tar -czf ../${{ matrix.asset_name }}.tar.gz kasha
        fi
      shell: bash
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.asset_name }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
        asset_name: ${{ matrix.asset_name }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
        asset_content_type: application/octet-stream

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-release
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## KashaLang ${{ github.ref }}
          
          ### What's New
          - See [CHANGELOG.md](CHANGELOG.md) for details
          
          ### Installation
          
          #### Linux/macOS
          ```bash
          tar -xzf kashalang-*.tar.gz
          sudo mv kasha /usr/local/bin/
          ```
          
          #### Windows
          Extract `kashalang-windows.zip` and add to PATH
          
          ### Quick Start
          ```bash
          kasha version
          kasha init my-project
          kasha run hello.kasha
          ```
          
          ### Documentation
          - [Full Docs](https://kashalang.dev/docs)
          - [Examples](https://github.com/kashalang/kashalang/tree/main/examples)
